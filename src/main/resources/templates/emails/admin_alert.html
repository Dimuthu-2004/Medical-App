<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: #1a202c;
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .content {
            padding: 30px;
            color: #4a5568;
            line-height: 1.6;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .data-table th,
        .data-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table th {
            background: #f7fafc;
            color: #718096;
            text-transform: uppercase;
            font-size: 11px;
        }

        .footer {
            background: #f7fafc;
            padding: 20px;
            text-align: center;
            color: #a0aec0;
            font-size: 11px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>NEW APPOINTMENT ALERT</h1>
        </div>
        <div class="content">
            <p>System Notification: A new appointment has been booked. Details below:</p>

            <table class="data-table">
                <tr>
                    <th>ID</th>
                    <td th:text="${appointmentId}">#000</td>
                </tr>
                <tr>
                    <th>Patient</th>
                    <td th:text="${patientName}">John Doe</td>
                </tr>
                <tr>
                    <th>Doctor</th>
                    <td th:text="${doctorName}">Dr. Smith</td>
                </tr>
                <tr>
                    <th>Date</th>
                    <td th:text="${date}">2024-01-01</td>
                </tr>
                <tr>
                    <th>Session</th>
                    <td th:text="${session}">Morning</td>
                </tr>
                <tr>
                    <th>Amount</th>
                    <td th:text="'LKR ' + ${amount}">LKR 0</td>
                </tr>
            </table>

            <p>Please review this in the <a href="http://localhost:8081/admin/dashboard">Admin Dashboard</a>.</p>
        </div>
        <div class="footer">
            Internal System Email - SmartClinic Infrastructure
        </div>
    </div>
</body>

</html>
