<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Error - SmartClinic')}"></head>

<body class="modern-dashboard-body">
    <nav th:replace="~{layout :: navbar}"></nav>
    <div class="container mt-5 pt-5">
        <div class="card glass-card-enhanced mx-auto text-center" style="max-width: 600px; padding: 3rem;">
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-4x text-danger"></i>
            </div>
            <h2 class="mb-3">Oops! Something went wrong</h2>
            <p class="lead mb-4"
                th:text="${errorMessage != null ? errorMessage : 'An unexpected error occurred. Please try again or contact support.'}">
            </p>
            <div th:if="${errorType}" class="mb-4">
                <small class="text-muted" th:text="'Error Type: ' + ${errorType}"></small>
            </div>
            <div class="d-flex justify-content-center gap-3">
                <a href="/" class="btn btn-modern btn-primary-modern px-5">Go Home</a>
                <button onclick="window.history.back()" class="btn btn-modern btn-outline-light text-primary px-5">Go
                    Back</button>
            </div>
        </div>
    </div>
    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>
